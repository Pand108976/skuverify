<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de SKU</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            text-align: center;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            font-size: 18px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            font-size: 18px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            color: #333;
        }

        .result span {
            font-weight: bold;
            color: #e74c3c;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Pesquisar SKU</h2>
    <input type="number" id="skuInput" placeholder="Digite o SKU..." inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')" />
    <button onclick="pesquisarSKU()">Localizar</button>

    function pesquisarSKU() {
        const skuInput = document.getElementById("skuInput");
        const resultDiv = document.getElementById("result");
        const skuNumber = skuInput.value.trim();

        if (skuNumber === "") {
            resultDiv.innerHTML = "<span>Digite um SKU válido!</span>";
            return;
        }

        let caixasEncontradas = [];
        for (const caixa in caixas) {
            if (caixas[caixa].includes(skuNumber)) {
                caixasEncontradas.push(caixa);
            }
        }

        if (caixasEncontradas.length > 0) {
            resultDiv.innerHTML = `O SKU <span>${skuNumber}</span> está na caixa número <span>${caixasEncontradas.join(", ")}</span>.`;
        } else {
            resultDiv.innerHTML = `<span>SKU não encontrado.</span>`;
        }

        setTimeout(() => {
            skuInput.value = "";
        }, 2000);
    }
</script>
